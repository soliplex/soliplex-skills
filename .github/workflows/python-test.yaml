name: Python tests/coverage

on:
  push:
    branches:
      - main
    paths:
      - 'pyproject.toml'
      - 'src/soliplex_skills/**'
      - 'tests/**'
      - '.github/workflows/python-test.yaml'
      - 'uv.lock'
  pull_request:
    branches:
      - main
    paths:
      - 'pyproject.toml'
      - 'src/soliplex_skills/**'
      - 'tests/**'
      - '.github/workflows/python-test.yaml'
      - 'uv.lock'
  workflow_dispatch:

jobs:
  test-soliplex-skills:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.12", "3.13", "3.14"]
        include:
            # Only enforce coverage on Python >= 3.13.
            - python-version: "3.12"
              pytest-args: "--no-cov"
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Run unit tests with coverage
        run: uv run pytest ${{ matrix.pytest-args }}

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_NOTIFY_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "channel": "#soliplex",
              "username": "soliplex",
              "text": ":x: ${{ github.workflow }} failed on ${{ github.head_ref }}:\n${{ github.event.head_commit.message }}\nhttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "icon_emoji": ":ghost:"
            }
